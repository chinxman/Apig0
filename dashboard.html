<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apig0 Gateway</title>
  <style>
    :root {
      --bg: #1a1b26;
      --bg-card: #16161e;
      --bg-deep: #0d0d12;
      --border: #2f334d;
      --text: #c0caf5;
      --text-dim: #565f89;
      --blue: #7aa2f7;
      --purple: #bb9af7;
      --green: #9ece6a;
      --yellow: #e0af68;
      --orange: #ff9e64;
      --red: #f7768e;
      --cyan: #7dcfff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-left h1 { font-size: 18px; color: var(--blue); font-weight: 700; }
    .header-left .gateway-url { font-size: 12px; color: var(--text-dim); }
    .header-right { display: flex; align-items: center; gap: 20px; font-size: 12px; }
    .conn-status { display: flex; align-items: center; gap: 6px; }
    .conn-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }
    .conn-dot.live { background: var(--green); box-shadow: 0 0 6px rgba(158,206,106,0.6); }
    .stat-box { text-align: right; }
    .stat-val { font-size: 20px; font-weight: 700; color: var(--text); }
    .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

    /* ── Main layout ── */
    .main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

    /* ── Service cards ── */
    .services { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; }
    .svc-card {
      flex: 1; min-width: 200px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .svc-card.flash {
      border-color: var(--blue);
      box-shadow: 0 0 12px rgba(122,162,247,0.15);
    }
    .svc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .svc-name { font-size: 15px; font-weight: 700; color: var(--purple); }
    .svc-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
    }
    .svc-dot.ok { background: var(--green); box-shadow: 0 0 6px rgba(158,206,106,0.5); }
    .svc-dot.err { background: var(--red); box-shadow: 0 0 6px rgba(247,118,142,0.5); }
    .svc-dot.idle { background: var(--text-dim); }
    .svc-backend { font-size: 11px; color: var(--text-dim); margin-bottom: 12px; word-break: break-all; }
    .svc-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .svc-stat-val { font-size: 16px; font-weight: 600; }
    .svc-stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }

    /* ── Request log ── */
    .log-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .log-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg-deep);
      border-bottom: 1px solid var(--border);
    }
    .log-header h2 { font-size: 13px; color: var(--blue); font-weight: 600; }
    .log-controls { display: flex; gap: 8px; }
    .log-controls button {
      background: var(--border);
      color: var(--text);
      border: none;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    .log-controls button:hover { background: var(--blue); color: var(--bg); }
    .log-controls button.active { background: var(--blue); color: var(--bg); }
    .log-body {
      height: 380px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .log-body::-webkit-scrollbar { width: 6px; }
    .log-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead { position: sticky; top: 0; z-index: 1; }
    th {
      text-align: left;
      padding: 8px 12px;
      background: var(--bg-deep);
      color: var(--text-dim);
      font-weight: 600;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }
    td { padding: 6px 12px; border-bottom: 1px solid #1a1b2e; white-space: nowrap; }
    tr { transition: background 0.15s; }
    tr:hover { background: rgba(122,162,247,0.05); }
    tr.new-row { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { background: rgba(122,162,247,0.12); } to { background: transparent; } }
    .method { font-weight: 700; }
    .method-get { color: var(--green); }
    .method-post { color: var(--blue); }
    .method-put { color: var(--yellow); }
    .method-delete { color: var(--red); }
    .method-options { color: var(--text-dim); }
    .status { font-weight: 700; padding: 2px 6px; border-radius: 3px; font-size: 11px; }
    .s2xx { color: var(--green); }
    .s3xx { color: var(--cyan); }
    .s4xx { color: var(--orange); }
    .s5xx { color: var(--red); background: rgba(247,118,142,0.1); }
    .latency-fast { color: var(--green); }
    .latency-mid { color: var(--yellow); }
    .latency-slow { color: var(--red); }
    .ip { color: var(--text-dim); }
    .user-tag { color: var(--purple); }
    .empty-log { padding: 40px; text-align: center; color: var(--text-dim); font-size: 13px; }

    /* ── Test console ── */
    .console {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }
    .console h2 { font-size: 13px; color: var(--blue); font-weight: 600; margin-bottom: 12px; }
    .console-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .console-input {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      width: 160px;
      outline: none;
      transition: border-color 0.2s;
    }
    .console-input:focus { border-color: var(--blue); }
    .test-btn {
      background: var(--border);
      color: var(--text);
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .test-btn:hover { background: var(--blue); color: var(--bg); }
    .test-result {
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
      word-break: break-all;
    }
    .test-result.show { display: block; }
    .test-result.ok { background: rgba(158,206,106,0.1); color: var(--green); border: 1px solid rgba(158,206,106,0.2); }
    .test-result.err { background: rgba(247,118,142,0.1); color: var(--red); border: 1px solid rgba(247,118,142,0.2); }

    /* ── Login overlay ── */
    .login-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(13,13,18,0.92);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
    }
    .login-overlay.visible { display: flex; }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 36px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }
    .login-card h2 {
      font-size: 20px; font-weight: 700;
      color: var(--blue); margin-bottom: 4px;
    }
    .login-card .login-sub {
      font-size: 12px; color: var(--text-dim); margin-bottom: 28px;
    }
    .login-step { display: none; }
    .login-step.active { display: block; }
    .login-field { margin-bottom: 16px; }
    .login-field label {
      display: block; font-size: 11px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px;
    }
    .login-field input {
      width: 100%;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 7px;
      font-family: inherit; font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-field input:focus { border-color: var(--blue); }
    .login-btn {
      width: 100%; margin-top: 8px;
      background: var(--blue); color: var(--bg);
      border: none; padding: 11px;
      border-radius: 7px;
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .login-err {
      margin-top: 12px; padding: 9px 12px;
      background: rgba(247,118,142,0.1);
      border: 1px solid rgba(247,118,142,0.25);
      border-radius: 6px;
      color: var(--red); font-size: 12px;
      display: none;
    }
    .login-err.visible { display: block; }
    .login-back {
      background: none; border: none; color: var(--text-dim);
      font-family: inherit; font-size: 12px;
      cursor: pointer; margin-top: 14px; padding: 0;
      text-decoration: underline;
    }
    .login-back:hover { color: var(--text); }

    /* ── Logout button ── */
    .logout-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-dim); padding: 4px 12px;
      border-radius: 5px; font-family: inherit; font-size: 11px;
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
      display: none;
    }
    .logout-btn.visible { display: block; }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }
    .session-user { font-size: 12px; color: var(--purple); display: none; }
    .session-user.visible { display: block; }
  </style>
</head>
<body>

  <!-- Login overlay -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-card">
      <h2>Apig0</h2>
      <div class="login-sub">Gateway access — authenticate to continue</div>

      <!-- Step 1: username + password -->
      <div class="login-step active" id="step-password">
        <div class="login-field">
          <label>Username</label>
          <input type="text" id="login-username" autocomplete="username" placeholder="devin">
        </div>
        <div class="login-field">
          <label>Password</label>
          <input type="password" id="login-password" autocomplete="current-password" placeholder="••••••••">
        </div>
        <button class="login-btn" id="btn-password" onclick="submitPassword()">Continue</button>
        <div class="login-err" id="err-password"></div>
      </div>

      <!-- Step 2: TOTP code -->
      <div class="login-step" id="step-totp">
        <div class="login-field">
          <label>Authenticator code</label>
          <input type="text" id="login-totp" autocomplete="one-time-code" placeholder="000000" maxlength="6" inputmode="numeric">
        </div>
        <button class="login-btn" id="btn-totp" onclick="submitTOTP()">Verify</button>
        <div class="login-err" id="err-totp"></div>
        <button class="login-back" onclick="backToPassword()">Back</button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>Apig0</h1>
      <span class="gateway-url" id="gateway-url"></span>
    </div>
    <div class="header-right">
      <span class="session-user" id="session-user"></span>
      <button class="logout-btn" id="logout-btn" onclick="logout()">Logout</button>
      <div class="conn-status">
        <div class="conn-dot" id="conn-dot"></div>
        <span id="conn-text">Connecting...</span>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="uptime">0s</div>
        <div class="stat-label">Uptime</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="total-req">0</div>
        <div class="stat-label">Requests</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="total-err" style="color:var(--red)">0</div>
        <div class="stat-label">Errors</div>
      </div>
    </div>
  </div>

  <div class="main">

    <!-- Service cards -->
    <div class="services" id="services"></div>

    <!-- Request log -->
    <div class="log-section">
      <div class="log-header">
        <h2>Live Requests</h2>
        <div class="log-controls">
          <button id="btn-pause" onclick="togglePause()">Pause</button>
          <button onclick="clearLog()">Clear</button>
        </div>
      </div>
      <div class="log-body" id="log-body">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Method</th>
              <th>Path</th>
              <th>Status</th>
              <th>Latency</th>
              <th>IP</th>
              <th>User</th>
            </tr>
          </thead>
          <tbody id="log-table"></tbody>
        </table>
        <div class="empty-log" id="empty-log">Waiting for requests...</div>
      </div>
    </div>

    <!-- Test console -->
    <div class="console">
      <h2>Test Console</h2>
      <div class="console-row">
        <button class="test-btn" onclick="testEndpoint('/healthz')">healthz</button>
        <button class="test-btn" onclick="testEndpoint('/users')">users</button>
        <button class="test-btn" onclick="testEndpoint('/products')">products</button>
        <button class="test-btn" onclick="testEndpoint('/orders')">orders</button>
      </div>
      <div class="test-result" id="test-result"></div>
    </div>

  </div>

<script>
// ── State ──
const GATEWAY = window.location.origin;
let paused = false;
let autoScroll = true;
let uptimeBase = 0;
let totalReq = 0;
let totalErr = 0;
let svcData = {};      // name -> { backend, requests, errors, avg_latency_ms, last_status, last_seen }
const MAX_LOG_ROWS = 300;

document.getElementById('gateway-url').textContent = GATEWAY;

// ── SSE Connection ──
let evtSource = null;
let reconnectTimer = null;

function connect() {
  if (evtSource) { evtSource.close(); }

  evtSource = new EventSource(GATEWAY + '/api/admin/events');

  evtSource.addEventListener('snapshot', (e) => {
    const snap = JSON.parse(e.data);
    uptimeBase = snap.uptime_sec;
    totalReq = snap.total;
    totalErr = snap.errors;
    svcData = snap.services || {};
    renderServices();
    updateCounters();

    // Load recent events into log
    if (snap.recent && snap.recent.length > 0) {
      for (const evt of snap.recent) {
        addLogRow(evt, false);
      }
    }
    setConnected(true);
  });

  evtSource.addEventListener('request', (e) => {
    const evt = JSON.parse(e.data);
    totalReq++;
    if (evt.status >= 400) totalErr++;
    updateServiceFromEvent(evt);
    updateCounters();
    if (!paused) {
      addLogRow(evt, true);
    }
  });

  evtSource.onopen = () => { setConnected(true); };
  evtSource.onerror = () => {
    setConnected(false);
    evtSource.close();
    // Reconnect after 3s
    if (reconnectTimer) clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(connect, 3000);
  };
}

function setConnected(ok) {
  const dot = document.getElementById('conn-dot');
  const txt = document.getElementById('conn-text');
  if (ok) {
    dot.classList.add('live');
    txt.textContent = 'Live';
    txt.style.color = 'var(--green)';
  } else {
    dot.classList.remove('live');
    txt.textContent = 'Disconnected';
    txt.style.color = 'var(--red)';
  }
}

// ── Uptime ticker ──
let uptimeOffset = 0;
setInterval(() => {
  uptimeOffset++;
  document.getElementById('uptime').textContent = fmtUptime(uptimeBase + uptimeOffset);
}, 1000);

function fmtUptime(sec) {
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec / 60) + 'm ' + (sec % 60) + 's';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  return h + 'h ' + m + 'm';
}

// ── Service cards ──
function renderServices() {
  const container = document.getElementById('services');
  container.innerHTML = '';
  const names = Object.keys(svcData).sort();
  for (const name of names) {
    const s = svcData[name];
    const card = document.createElement('div');
    card.className = 'svc-card';
    card.id = 'svc-' + name;

    let dotClass = 'idle';
    if (s.requests > 0) {
      dotClass = (s.last_status >= 200 && s.last_status < 400) ? 'ok' : 'err';
    }

    const errRate = s.requests > 0 ? ((s.errors / s.requests) * 100).toFixed(1) : '0.0';
    const avgLat = s.avg_latency_ms ? s.avg_latency_ms.toFixed(1) : '--';

    card.innerHTML = `
      <div class="svc-header">
        <span class="svc-name">${name}</span>
        <div class="svc-dot ${dotClass}" id="svc-dot-${name}"></div>
      </div>
      <div class="svc-backend">${s.backend || ''}</div>
      <div class="svc-stats">
        <div><div class="svc-stat-val" id="svc-req-${name}">${fmtNum(s.requests)}</div><div class="svc-stat-label">Requests</div></div>
        <div><div class="svc-stat-val" id="svc-err-${name}" style="color:${s.errors > 0 ? 'var(--red)' : 'var(--text)'}">${fmtNum(s.errors)}</div><div class="svc-stat-label">Errors</div></div>
        <div><div class="svc-stat-val ${latencyClass(s.avg_latency_ms)}" id="svc-lat-${name}">${avgLat}</div><div class="svc-stat-label">Avg ms</div></div>
        <div><div class="svc-stat-val" id="svc-rate-${name}" style="color:${parseFloat(errRate) > 5 ? 'var(--red)' : 'var(--green)'}">${errRate}%</div><div class="svc-stat-label">Err rate</div></div>
      </div>
    `;
    container.appendChild(card);
  }
}

function updateServiceFromEvent(evt) {
  const svc = evt.service;
  if (!svc) return;

  if (!svcData[svc]) {
    svcData[svc] = { name: svc, backend: '', requests: 0, errors: 0, avg_latency_ms: 0, last_status: 0, last_seen: 0 };
    renderServices();
    return;
  }

  const s = svcData[svc];
  const totalLat = s.avg_latency_ms * s.requests;
  s.requests++;
  if (evt.status >= 400) s.errors++;
  s.avg_latency_ms = (totalLat + evt.latency_ms) / s.requests;
  s.last_status = evt.status;
  s.last_seen = evt.ts;

  // Update card values without full re-render
  const reqEl = document.getElementById('svc-req-' + svc);
  if (reqEl) {
    reqEl.textContent = fmtNum(s.requests);
    const errEl = document.getElementById('svc-err-' + svc);
    errEl.textContent = fmtNum(s.errors);
    errEl.style.color = s.errors > 0 ? 'var(--red)' : 'var(--text)';
    document.getElementById('svc-lat-' + svc).textContent = s.avg_latency_ms.toFixed(1);
    document.getElementById('svc-lat-' + svc).className = 'svc-stat-val ' + latencyClass(s.avg_latency_ms);
    const errRate = ((s.errors / s.requests) * 100).toFixed(1);
    const rateEl = document.getElementById('svc-rate-' + svc);
    rateEl.textContent = errRate + '%';
    rateEl.style.color = parseFloat(errRate) > 5 ? 'var(--red)' : 'var(--green)';

    const dotEl = document.getElementById('svc-dot-' + svc);
    dotEl.className = 'svc-dot ' + ((evt.status >= 200 && evt.status < 400) ? 'ok' : 'err');
  }

  // Flash card
  const card = document.getElementById('svc-' + svc);
  if (card) {
    card.classList.add('flash');
    setTimeout(() => card.classList.remove('flash'), 400);
  }
}

// ── Counters ──
function updateCounters() {
  document.getElementById('total-req').textContent = fmtNum(totalReq);
  document.getElementById('total-err').textContent = fmtNum(totalErr);
}

// ── Request log ──
function addLogRow(evt, animate) {
  const tbody = document.getElementById('log-table');
  const empty = document.getElementById('empty-log');
  if (empty) empty.style.display = 'none';

  const tr = document.createElement('tr');
  if (animate) tr.className = 'new-row';

  const time = new Date(evt.ts).toLocaleTimeString('en-GB', { hour12: false });
  const methodCls = 'method method-' + evt.method.toLowerCase();
  const statusCls = 'status ' + statusClass(evt.status);
  const latCls = latencyClass(evt.latency_ms);

  tr.innerHTML = `
    <td style="color:var(--text-dim)">${time}</td>
    <td><span class="${methodCls}">${evt.method}</span></td>
    <td>${evt.path}</td>
    <td><span class="${statusCls}">${evt.status}</span></td>
    <td class="${latCls}">${evt.latency_ms.toFixed(1)}ms</td>
    <td class="ip">${evt.client_ip}</td>
    <td class="user-tag">${evt.user || '-'}</td>
  `;

  // Insert at top
  if (tbody.firstChild) {
    tbody.insertBefore(tr, tbody.firstChild);
  } else {
    tbody.appendChild(tr);
  }

  // Trim old rows
  while (tbody.children.length > MAX_LOG_ROWS) {
    tbody.removeChild(tbody.lastChild);
  }

  // Auto-scroll to top
  if (autoScroll && animate) {
    document.getElementById('log-body').scrollTop = 0;
  }
}

function clearLog() {
  document.getElementById('log-table').innerHTML = '';
  document.getElementById('empty-log').style.display = 'block';
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('btn-pause');
  btn.textContent = paused ? 'Resume' : 'Pause';
  if (paused) btn.classList.add('active'); else btn.classList.remove('active');
}

// Track user scroll — if they scroll down, stop auto-scroll
document.getElementById('log-body').addEventListener('scroll', function() {
  autoScroll = this.scrollTop < 10;
});

// ── Test console ──
async function testEndpoint(path) {
  const result = document.getElementById('test-result');
  result.className = 'test-result show';
  result.textContent = 'Testing ' + path + '...';
  result.style.color = 'var(--text-dim)';
  result.style.background = 'var(--bg-deep)';
  result.style.border = '1px solid var(--border)';

  try {
    const resp = await fetch(GATEWAY + path);
    let body;
    const ct = resp.headers.get('content-type') || '';
    if (ct.includes('json')) {
      body = JSON.stringify(await resp.json(), null, 2);
    } else {
      body = await resp.text();
      if (body.length > 500) body = body.substring(0, 500) + '...';
    }

    if (resp.ok) {
      result.className = 'test-result show ok';
      result.textContent = resp.status + ' OK\n' + body;
    } else {
      result.className = 'test-result show err';
      result.textContent = resp.status + ' ' + resp.statusText + '\n' + body;
    }
  } catch (err) {
    result.className = 'test-result show err';
    result.textContent = 'Network error: ' + err.message;
  }
}


// ── Helpers ──
function statusClass(s) {
  if (s >= 500) return 's5xx';
  if (s >= 400) return 's4xx';
  if (s >= 300) return 's3xx';
  return 's2xx';
}

function latencyClass(ms) {
  if (!ms || ms < 50) return 'latency-fast';
  if (ms < 200) return 'latency-mid';
  return 'latency-slow';
}

function fmtNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return String(n);
}

// ── Auth ──
let pendingChallenge = null;

async function checkAuth() {
  try {
    const resp = await fetch(GATEWAY + '/api/admin/stats');
    if (resp.status === 401) {
      showLogin();
    } else {
      // Session already valid (e.g. page refresh) — restore the logout button
      const user = localStorage.getItem('apig0_user') || '';
      hideLogin(user);
      connect();
    }
  } catch {
    showLogin();
  }
}

function showLogin() {
  // Wipe any stored user trail
  localStorage.removeItem('apig0_user');
  // Always reset to step 1 — clear all state before showing
  pendingChallenge = null;
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('login-totp').value = '';
  setLoginErr('err-password', '');
  setLoginErr('err-totp', '');
  setLoginBusy('btn-password', false);
  setLoginBusy('btn-totp', false);
  document.getElementById('step-totp').classList.remove('active');
  document.getElementById('step-password').classList.add('active');
  document.getElementById('login-overlay').classList.add('visible');
  document.getElementById('login-username').focus();
}

function hideLogin(user) {
  if (user) localStorage.setItem('apig0_user', user);
  document.getElementById('login-overlay').classList.remove('visible');
  const userEl = document.getElementById('session-user');
  userEl.textContent = user;
  userEl.classList.add('visible');
  document.getElementById('logout-btn').classList.add('visible');
}

function backToPassword() {
  pendingChallenge = null;
  document.getElementById('step-totp').classList.remove('active');
  document.getElementById('step-password').classList.add('active');
  setLoginErr('err-totp', '');
  document.getElementById('login-totp').value = '';
  document.getElementById('login-password').focus();
}

function setLoginErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.toggle('visible', msg !== '');
}

function setLoginBusy(btnId, busy) {
  document.getElementById(btnId).disabled = busy;
}

async function submitPassword() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) { setLoginErr('err-password', 'Username and password required'); return; }
  setLoginBusy('btn-password', true);
  setLoginErr('err-password', '');
  try {
    const resp = await fetch(GATEWAY + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      setLoginErr('err-password', data.error || 'Login failed');
      return;
    }
    pendingChallenge = data.challenge;
    document.getElementById('step-password').classList.remove('active');
    document.getElementById('step-totp').classList.add('active');
    document.getElementById('login-totp').focus();
  } catch {
    setLoginErr('err-password', 'Network error');
  } finally {
    setLoginBusy('btn-password', false);
  }
}

async function submitTOTP() {
  const code = document.getElementById('login-totp').value.trim();
  if (!code) { setLoginErr('err-totp', 'Enter your 6-digit code'); return; }
  setLoginBusy('btn-totp', true);
  setLoginErr('err-totp', '');
  try {
    const resp = await fetch(GATEWAY + '/auth/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ challenge: pendingChallenge, code }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      setLoginErr('err-totp', data.error || 'Verification failed');
      return;
    }
    hideLogin(data.user);
    connect();
  } catch {
    setLoginErr('err-totp', 'Network error');
  } finally {
    setLoginBusy('btn-totp', false);
  }
}

async function logout() {
  await fetch(GATEWAY + '/auth/logout', { method: 'POST' });
  if (evtSource) { evtSource.close(); evtSource = null; }
  document.getElementById('session-user').classList.remove('visible');
  document.getElementById('logout-btn').classList.remove('visible');
  setConnected(false);
  showLogin(); // resets to step 1, clears all fields and challenge token
}

// Enter key bindings for login form
document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') submitPassword(); });
document.getElementById('login-totp').addEventListener('keydown', e => { if (e.key === 'Enter') submitTOTP(); });
document.getElementById('login-username').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-password').focus();
});

// ── Start ──
checkAuth();
</script>
