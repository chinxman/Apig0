<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apig0 Portal</title>
  <style>
    :root {
      --bg: #1a1b26; --bg-card: #16161e; --bg-deep: #0d0d12;
      --border: #2f334d; --text: #c0caf5; --text-dim: #565f89;
      --blue: #7aa2f7; --purple: #bb9af7; --green: #9ece6a;
      --red: #f7768e; --yellow: #e0af68;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace; background: var(--bg); color: var(--text); min-height: 100vh; }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px; background: var(--bg-deep); border-bottom: 1px solid var(--border);
    }
    .header h1 { font-size: 18px; color: var(--blue); font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 16px; font-size: 13px; }
    .user-badge { color: var(--purple); font-weight: 600; }
    .role-badge {
      background: rgba(122,162,247,0.1); border: 1px solid rgba(122,162,247,0.3);
      color: var(--blue); padding: 2px 8px; border-radius: 4px; font-size: 11px;
    }
    .logout-btn {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      padding: 5px 14px; border-radius: 5px; font-family: inherit; font-size: 12px;
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    .main { padding: 32px 28px; max-width: 1000px; margin: 0 auto; }

    .welcome { margin-bottom: 32px; }
    .welcome h2 { font-size: 22px; color: var(--text); font-weight: 700; margin-bottom: 6px; }
    .welcome p { color: var(--text-dim); font-size: 13px; }

    .section-title {
      font-size: 11px; color: var(--text-dim); text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 14px; font-weight: 600;
    }

    .services { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 36px; }
    .svc-card {
      flex: 1; min-width: 180px; max-width: 240px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px 18px; cursor: pointer;
      text-decoration: none; color: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .svc-card:hover { border-color: var(--blue); box-shadow: 0 0 14px rgba(122,162,247,0.1); }
    .svc-name { font-size: 15px; font-weight: 700; color: var(--purple); margin-bottom: 6px; }
    .svc-url { font-size: 11px; color: var(--text-dim); word-break: break-all; }

    .session-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px 22px; display: flex; gap: 32px;
    }
    .stat { }
    .stat-val { font-size: 20px; font-weight: 700; color: var(--text); }
    .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
    .stat-val.ok { color: var(--green); }
    .stat-val.warn { color: var(--yellow); }

    .login-overlay {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(13,13,18,0.94); backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
    }
    .login-overlay.visible { display: flex; }
    .login-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 36px 40px; width: 100%; max-width: 380px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }
    .login-card h2 { font-size: 20px; font-weight: 700; color: var(--blue); margin-bottom: 4px; }
    .login-sub { font-size: 12px; color: var(--text-dim); margin-bottom: 28px; }
    .login-step { display: none; }
    .login-step.active { display: block; }
    .login-field { margin-bottom: 16px; }
    .login-field label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
    .login-field input {
      width: 100%; background: var(--bg-deep); border: 1px solid var(--border);
      color: var(--text); padding: 10px 14px; border-radius: 7px;
      font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .login-field input:focus { border-color: var(--blue); }
    .login-btn {
      width: 100%; margin-top: 8px; background: var(--blue); color: var(--bg);
      border: none; padding: 11px; border-radius: 7px;
      font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.85; }
    .login-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .login-err {
      margin-top: 12px; padding: 9px 12px;
      background: rgba(247,118,142,0.1); border: 1px solid rgba(247,118,142,0.25);
      border-radius: 6px; color: var(--red); font-size: 12px; display: none;
    }
    .login-err.visible { display: block; }
    .login-back { background: none; border: none; color: var(--text-dim); font-family: inherit; font-size: 12px; cursor: pointer; margin-top: 14px; padding: 0; text-decoration: underline; }
    .login-back:hover { color: var(--text); }
  </style>
</head>
<body>

  <div class="login-overlay" id="login-overlay">
    <div class="login-card">
      <h2>Apig0</h2>
      <div class="login-sub">Sign in to access your services</div>
      <div class="login-step active" id="step-password">
        <div class="login-field">
          <label>Username</label>
          <input type="text" id="login-username" autocomplete="username" placeholder="username">
        </div>
        <div class="login-field">
          <label>Password</label>
          <input type="password" id="login-password" autocomplete="current-password" placeholder="••••••••">
        </div>
        <button class="login-btn" id="btn-password" onclick="submitPassword()">Continue</button>
        <div class="login-err" id="err-password"></div>
      </div>
      <div class="login-step" id="step-totp">
        <div class="login-field">
          <label>Authenticator code</label>
          <input type="text" id="login-totp" autocomplete="one-time-code" placeholder="000000" maxlength="6" inputmode="numeric">
        </div>
        <button class="login-btn" id="btn-totp" onclick="submitTOTP()">Verify</button>
        <div class="login-err" id="err-totp"></div>
        <button class="login-back" onclick="backToPassword()">Back</button>
      </div>
    </div>
  </div>

  <div class="header">
    <h1>Apig0</h1>
    <div class="header-right">
      <span class="user-badge" id="hdr-user"></span>
      <span class="role-badge" id="hdr-role"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="main">
    <div class="welcome">
      <h2 id="welcome-msg">Welcome</h2>
      <p>Select a service below or use the API paths directly.</p>
    </div>

    <div class="section-title">Available Services</div>
    <div class="services" id="services">
      <div style="color:var(--text-dim);font-size:13px">Loading...</div>
    </div>

    <div class="section-title">Session</div>
    <div class="session-card">
      <div class="stat">
        <div class="stat-val ok" id="sess-status">Active</div>
        <div class="stat-label">Status</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="sess-user">—</div>
        <div class="stat-label">User</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="sess-role">—</div>
        <div class="stat-label">Role</div>
      </div>
    </div>
  </div>

<script>
const GATEWAY = window.location.origin;
let pendingChallenge = null;

// Services are fetched from /api/admin/stats if available, else hardcoded
const SERVICES = [
  { name: 'users',    path: '/users' },
  { name: 'products', path: '/products' },
  { name: 'orders',   path: '/orders' },
];

async function init() {
  try {
    const resp = await fetch(GATEWAY + '/api/user/info');
    if (resp.status === 401) { showLogin(); return; }
    const data = await resp.json();
    showPortal(data.user, data.role);
  } catch {
    showLogin();
  }
}

function showPortal(user, role) {
  document.getElementById('login-overlay').classList.remove('visible');
  document.getElementById('hdr-user').textContent = user;
  document.getElementById('hdr-role').textContent = role || 'user';
  document.getElementById('welcome-msg').textContent = 'Welcome, ' + user;
  document.getElementById('sess-user').textContent = user;
  document.getElementById('sess-role').textContent = role || 'user';

  const container = document.getElementById('services');
  container.innerHTML = '';
  for (const svc of SERVICES) {
    const a = document.createElement('a');
    a.className = 'svc-card';
    a.href = GATEWAY + svc.path;
    a.target = '_blank';
    a.innerHTML = `<div class="svc-name">${svc.name}</div><div class="svc-url">${GATEWAY}${svc.path}</div>`;
    container.appendChild(a);
  }

  if (role === 'admin') {
    const link = document.createElement('a');
    link.className = 'svc-card';
    link.href = '/dashboard';
    link.innerHTML = `<div class="svc-name" style="color:var(--blue)">Admin Dashboard</div><div class="svc-url">${GATEWAY}/dashboard</div>`;
    container.appendChild(link);
  }
}

function showLogin() {
  pendingChallenge = null;
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('login-totp').value = '';
  setErr('err-password', ''); setErr('err-totp', '');
  setBusy('btn-password', false); setBusy('btn-totp', false);
  document.getElementById('step-totp').classList.remove('active');
  document.getElementById('step-password').classList.add('active');
  document.getElementById('login-overlay').classList.add('visible');
  document.getElementById('login-username').focus();
}

function backToPassword() {
  pendingChallenge = null;
  document.getElementById('step-totp').classList.remove('active');
  document.getElementById('step-password').classList.add('active');
  setErr('err-totp', '');
}

function setErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.toggle('visible', msg !== '');
}
function setBusy(id, busy) { document.getElementById(id).disabled = busy; }

async function submitPassword() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) { setErr('err-password', 'Username and password required'); return; }
  setBusy('btn-password', true); setErr('err-password', '');
  try {
    const resp = await fetch(GATEWAY + '/auth/login', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password}),
    });
    const data = await resp.json();
    if (!resp.ok) { setErr('err-password', data.error || 'Login failed'); return; }
    pendingChallenge = data.challenge;
    document.getElementById('step-password').classList.remove('active');
    document.getElementById('step-totp').classList.add('active');
    document.getElementById('login-totp').focus();
  } catch { setErr('err-password', 'Network error'); }
  finally { setBusy('btn-password', false); }
}

async function submitTOTP() {
  const code = document.getElementById('login-totp').value.trim();
  if (!code) { setErr('err-totp', 'Enter your 6-digit code'); return; }
  setBusy('btn-totp', true); setErr('err-totp', '');
  try {
    const resp = await fetch(GATEWAY + '/auth/verify', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({challenge: pendingChallenge, code}),
    });
    const data = await resp.json();
    if (!resp.ok) { setErr('err-totp', data.error || 'Verification failed'); return; }
    showPortal(data.user, data.role);
  } catch { setErr('err-totp', 'Network error'); }
  finally { setBusy('btn-totp', false); }
}

async function logout() {
  await fetch(GATEWAY + '/auth/logout', {method: 'POST'});
  showLogin();
}

document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') submitPassword(); });
document.getElementById('login-totp').addEventListener('keydown', e => { if (e.key === 'Enter') submitTOTP(); });
document.getElementById('login-username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('login-password').focus(); });

init();
</script>
</body>
</html>
