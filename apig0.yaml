# Apig0 — persistent configuration
# Settings here survive restarts. Environment variables always override these.
# Do NOT store secrets in this file (no tokens, passwords, or TOTP secrets).

vault:
  type: ""                         # leave blank for clean-slate boot; setup flow chooses the backend
  address: ""                      # hashicorp only
  engine: ""                       # hashicorp only — KV engine name
  secret_path: totp                # logical group name (default: totp)
  secret_key: secret               # key inside secret data (default: secret)
  file_path: totp-secrets.json     # file only — local persistent TOTP store for web-created users

gateway:
  users: ""                        # leave blank; the setup flow creates the first admin
  port: "8080"
  session_ttl: 8h                  # e.g. 8h, 30m, 24h
  show_qr: false
  tls: auto                        # auto | off | /path/cert.pem,/path/key.pem
